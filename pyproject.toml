[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "crispyx"
version = "0.1.0"
description = "Tools for scalable CRISPR screen analysis on on-disk AnnData objects"
authors = [{name = "Streamlining CRISPR Team"}]
dependencies = [
    "anndata>=0.9",
    "numpy>=1.23",
    "pandas>=1.5",
    "scipy>=1.10,<=1.12.0",
    "scanpy>=1.9.2",
    "pertpy>=0.4",
]

[project.optional-dependencies]
test = [
    "anndata>=0.9",
    "numpy>=1.23",
    "pandas>=1.5",
    "scipy>=1.10,<=1.12.0",
    "scanpy>=1.9.2",
    "pertpy>=0.4",
    "filelock",
    "pytest",
    "statsmodels>=0.14",
    "pydeseq2>=0.4",
]
benchmark = [
    "pyyaml>=6.0",
    "tqdm>=4.65",
    "psutil; sys_platform == 'darwin'",
]

[tool.pytest.ini_options]
addopts = "-q"
