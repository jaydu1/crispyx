# Benchmark Configuration for Adamson_subset
# Subset of Adamson dataset for testing and development

dataset_path: "data/Adamson_subset.h5ad"
output_dir: "benchmarking/results/Adamson_subset"

# Dataset column configuration
perturbation_column: "perturbation"
control_label: null  # Auto-detects 'control'
gene_name_column: null  # Uses var.index

# Quality control parameters - set to null to use adaptive calculation
qc_params: null  # Will be calculated adaptively based on data distribution

# Resource limits (smaller limits for subset)
resource_limits:
  time_limit: 3600  # 1 hour per method
  memory_limit: 64.0  # GB per method

# Parallelization configuration
parallel_config:
  n_cores: 8  # Reduced from 32 to limit memory multiplication in parallel code

# Environment configuration (optional - auto-detects if omitted)
# environment_config:
#   r_home: null  # Path to R installation (e.g., /path/to/R/lib/R), null = auto-detect
#   default_n_cores: null  # Default cores for parallel ops, null = use parallel_config.n_cores or auto-detect

# Adaptive QC mode
force_restandardize: false  # Set to true to regenerate standardized files
adaptive_qc_mode: conservative  # or 'aggressive'

# Methods to run (null = run all available methods)
# Scanpy comparisons are now optimized to load data only once and cache results
methods_to_run: null

# Progress and output options
show_progress: true
quiet: false

# Docker configuration (optional - for cross-platform reproducible execution)
# docker_config:
#   enabled: false  # Set to true to run benchmarks inside Docker containers
#   image: "crispyx-benchmark:latest"  # Docker image name
