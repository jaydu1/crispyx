# Benchmark Configuration for Nadig-HEPG2
# Auto-generated by inspect_datasets.py

dataset_path: "data/origin/Nadig-HEPG2.h5ad"
output_dir: "benchmarking/results/Nadig-HEPG2"

# Dataset column configuration
perturbation_column: "gene"
control_label: null  # Auto-detects 'non-targeting'
gene_name_column: "gene_name"

# Quality control parameters - set to null to use adaptive calculation
qc_params: null  # Will be calculated adaptively based on data distribution

# Resource limits - Tier 2 (medium datasets)
resource_limits:
  time_limit: 21600  # 6 hours per method
  memory_limit: 128.0  # GB per method

# Parallelization configuration (6 GB/core on HPC)
parallel_config:
  n_cores: 32  # 128 GB, 32 cores for all datasets

# Adaptive QC mode
force_restandardize: false  # Set to true to regenerate standardized files
adaptive_qc_mode: conservative  # or 'aggressive'

# Methods to run (null = run all available methods)
methods_to_run: null

# Progress and output options
show_progress: true
quiet: false