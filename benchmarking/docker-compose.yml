# Docker Compose for crispyx Benchmarking
#
# Usage:
#   docker-compose up benchmark              # Run benchmark with default config
#   docker-compose run benchmark --config benchmarking/config/Adamson.yaml
#   docker-compose run dev                   # Interactive shell for development
#
# Environment variables:
#   MEMORY_LIMIT: Memory limit in GB (default: 64)
#   CONFIG_FILE: Path to benchmark config (default: benchmarking/config/Adamson_subset.yaml)
#   N_CORES: Number of CPU cores to use (default: 8)
#
# Note: For running individual benchmark methods, use the Python CLI with --use-docker flag:
#   python -m benchmarking.tools.run_benchmarks --config config.yaml --use-docker

version: "3.8"

services:
  # Main benchmark service - runs full benchmark suite
  benchmark:
    build:
      context: ..
      dockerfile: benchmarking/Dockerfile
    image: crispyx-benchmark:latest
    
    # Memory limit - can be overridden via environment variable
    # For non-swarm mode, use mem_limit
    mem_limit: ${MEMORY_LIMIT:-64}g
    
    volumes:
      # Mount data directory (read-only for safety)
      - ../data:/workspace/data:ro
      
      # Mount results directory (read-write for outputs)
      - ../benchmarking/results:/workspace/benchmarking/results:rw
      
      # Mount logs directory (read-write for logs)
      - ../benchmarking/logs:/workspace/benchmarking/logs:rw
      
      # Mount config directory (read-only)
      - ../benchmarking/config:/workspace/benchmarking/config:ro
      
      # Mount source for development (optional - comment out for production)
      - ../src:/workspace/src:ro
      
      # Mount host timezone so container timestamps match host time
      - /etc/localtime:/etc/localtime:ro
    
    # Working directory
    working_dir: /workspace
    
    # Environment variables
    environment:
      - PYTHONUNBUFFERED=1
      - NUMBA_NUM_THREADS=${N_CORES:-8}
      - OMP_NUM_THREADS=${N_CORES:-8}
      - MKL_NUM_THREADS=${N_CORES:-8}
      - OPENBLAS_NUM_THREADS=${N_CORES:-8}
    
    # Default command - run benchmark
    entrypoint: ["python", "-m", "benchmarking.tools.run_benchmarks"]
    command: ["--config", "${CONFIG_FILE:-benchmarking/config/Adamson_subset.yaml}"]

  # Development service with interactive shell
  dev:
    build:
      context: ..
      dockerfile: benchmarking/Dockerfile
    image: crispyx-benchmark:latest
    
    mem_limit: ${MEMORY_LIMIT:-64}g
    
    volumes:
      - ../data:/workspace/data:rw
      - ../benchmarking:/workspace/benchmarking:rw
      - ../src:/workspace/src:rw
      - ../tests:/workspace/tests:rw
      # Mount host timezone so container timestamps match host time
      - /etc/localtime:/etc/localtime:ro
    
    working_dir: /workspace
    
    environment:
      - PYTHONUNBUFFERED=1
    
    # Interactive shell
    entrypoint: ["/bin/bash"]
    stdin_open: true
    tty: true
