# Benchmark Configuration for Huang-HCT116
# Auto-generated by inspect_datasets.py

dataset_path: "data/origin/Huang-HCT116.h5ad"
output_dir: "benchmarking/results/Huang-HCT116"

# Dataset column configuration
perturbation_column: "gene_target"
control_label: null  # Auto-detects 'CTRL'
gene_name_column: null  # Uses var.index

# Quality control parameters - set to null to use adaptive calculation
qc_params: null  # Will be calculated adaptively based on data distribution

# Resource limits - Tier 3 (large datasets)
resource_limits:
  time_limit: 86400  # 24 hours per method
  memory_limit: 128.0  # GB per method

# Parallelization configuration
parallel_config:
  n_cores: 32  # 128 GB, 32 cores for all datasets

# Adaptive QC mode
force_restandardize: false  # Set to true to regenerate standardized files
adaptive_qc_mode: conservative  # or 'aggressive'

# Methods to run (null = run all available methods)
# Excluding NB-GLM methods (edgeR, PyDESeq2, crispyx NB-GLM)
methods_to_run:
  - crispyx_qc_filtered
  - crispyx_pb_avg_log
  - crispyx_pb_pseudobulk
  - crispyx_de_t_test
  - crispyx_de_wilcoxon
  - scanpy_qc_filtered
  - scanpy_de_t_test
  - scanpy_de_wilcoxon

# Progress and output options
show_progress: true
quiet: false