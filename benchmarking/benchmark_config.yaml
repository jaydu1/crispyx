# CRISPYx Benchmark Configuration
# This file defines benchmarking parameters and datasets to test

# Single dataset configuration (simple mode)
dataset_path: "/data/projects/SeqExpDesign/data/origin/Adamson.h5ad"
output_dir: "benchmarking/results/Adamson"

# Dataset column configuration
perturbation_column: "gene"  # Will be renamed to 'perturbation' during standardization
control_label: null  # null = auto-detect control (CTRL → control)
gene_name_column: "gene_symbols"

# Quality control parameters - set to null to use adaptive calculation
qc_params: null  # Will be calculated adaptively based on data distribution

# Resource limits (0 = no limit)
resource_limits:
  time_limit: 36000  # seconds per method (increased for Pertpy GLM methods)
  memory_limit: 128  # GB per method (0 = no limit; multiprocessing overhead can cause issues with tight limits)

# Parallelization configuration
parallel_config:
  n_cores: 32  # Use 2 cores for testing

# Adaptive QC mode
force_restandardize: false  # Set to true to regenerate standardized files
adaptive_qc_mode: conservative  # or 'aggressive'

# Methods to run (null = run all available methods)
methods_to_run: null
  # - quality_control
  # - average_log_expression
  # - wald_test
  # - wilcoxon_test
  # Skip comparison methods for now

# Progress and output options
show_progress: true
quiet: false

